<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NEURO-SYNC V4.0 | MEDICAL INTERFACE</title>
    <style>
        :root {
            --bg-color: #05070a;
            --panel-color: #0c111a;
            --accent-color: #00ffcc; /* ירוק-כחול רפואי */
            --text-color: #94a3b8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            border-bottom: 2px solid #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-color);
        }
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            flex-grow: 1;
            gap: 2px;
            background: #1e293b;
        }
        .sidebar {
            background: var(--panel-color);
            padding: 20px;
            font-size: 12px;
        }
        .content {
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        .video-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 10px;
            border: 1px solid #334155;
            aspect-ratio: 16/9;
        }
        .graph-area {
            flex-grow: 1;
            background: #000;
            border: 1px solid #1e293b;
            position: relative;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; }
        .btn-medical {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .btn-medical:hover { background: rgba(0, 255, 204, 0.1); }
        .stat-line { margin-bottom: 10px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .value { color: #fff; float: left; }
    </style>
</head>
<body>

<div class="header">
    <div style="color: var(--accent-color); font-weight: bold;">NEURO-SYNC TERMINAL v4.0.2</div>
    <button class="btn-medical" id="initBtn">INITIALIZE SESSION</button>
</div>

<div class="main-layout">
    <div class="sidebar">
        <h3>SYSTEM STATUS</h3>
        <div class="stat-line">BT LINK: <span class="value" id="btStatus">CONNECTED</span></div>
        <div class="stat-line">SIGNAL: <span class="value" id="sigStrength">98.4%</span></div>
        <div class="stat-line">ALPHA: <span class="value" id="val1">--</span></div>
        <div class="stat-line">BETA: <span class="value" id="val2">--</span></div>
        <div class="stat-line">STRESS INDEX: <span class="value" id="stressVal">PENDING</span></div>
        <div style="margin-top: 50px; opacity: 0.5;">
            NOTICE: Open-Label Placebo Protocol Active. 
            Brain-wave patterns are simulated for neurological feedback loop training.
        </div>
    </div>
    <div class="content">
        <div class="video-box" id="player"></div>
        <div class="graph-area">
            <canvas id="neuroCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let player, isRunning = false;
    const canvas = document.getElementById('neuroCanvas');
    const ctx = canvas.getContext('2d');
    
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'BnjdaA6GEJw',
            playerVars: { 'controls': 0, 'disablekb': 1 }
        });
    }

    let points = [];
    let currentY = 50; // Starting stress level %
    let targetY = 10;
    
    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function updateStats() {
        if(!isRunning) return;
        document.getElementById('val1').innerText = (Math.random() * 5 + 10).toFixed(2) + " Hz";
        document.getElementById('val2').innerText = (Math.random() * 10 + 15).toFixed(2) + " Hz";
        document.getElementById('stressVal').innerText = (currentY).toFixed(1) + "%";
    }

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Grid
        ctx.strokeStyle = '#0a1018';
        for(let i=0; i<canvas.width; i+=40) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
        }

        if(isRunning) {
            // Asymptotic descent logic: Slows down as it gets lower
            let speed = 0.002; 
            let noise = (Math.random() - 0.5) * 0.4;
            currentY += (targetY - currentY) * speed + noise;

            points.push(currentY);
            if(points.length > canvas.width / 2) points.shift();
        }

        // Render line
        ctx.beginPath();
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#00ffcc';
        
        let xStep = canvas.width / (canvas.width / 2);
        for(let i=0; i<points.length; i++) {
            let x = i * xStep;
            let y = (points[i] / 100) * canvas.height;
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();

        requestAnimationFrame(animate);
    }

    document.getElementById('initBtn').addEventListener('click', function() {
        isRunning = true;
        player.playVideo();
        this.innerText = "SESSION ACTIVE";
        this.disabled = true;
        setInterval(updateStats, 1000);
    });

    animate();
</script>
</body>
</html>
